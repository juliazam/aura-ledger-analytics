x-airflow-common: &airflow-common
  build: .
  user: "${AIRFLOW_UID}:0"
  environment:
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:Admin"
    AIRFLOW_CONN_FINTECH_API_RATES: ${AIRFLOW_CONN_FINTECH_API_RATES}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW_CONN_FINTECH_OLTP_DB: ${AIRFLOW_CONN_FINTECH_OLTP_DB}
    AIRFLOW_VAR_AURA_ETL_CONFIG: ${AIRFLOW_VAR_AURA_ETL_CONFIG}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./include:/opt/airflow/include
  depends_on:
    postgres_infra:
      condition: service_healthy
    fintech_oltp_db_service:
      condition: service_healthy

services:
  airflow-init:
    <<: *airflow-common
    command: db migrate
    user: "0:0"

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  
  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - 9091:8080
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  
  postgres_infra:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${METADB_USER}
      - POSTGRES_PASSWORD=${METADB_PASSWORD}
      - POSTGRES_DB=${METADB_DB}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${METADB_USER}", "-d", "${METADB_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
  fintech_oltp_db_service:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${METADB_USER}
      - POSTGRES_PASSWORD=${METADB_PASSWORD}
      - POSTGRES_DB=fintech_oltp
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${METADB_USER}", "-d", "fintech_oltp"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s